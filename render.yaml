services:
  - type: web
    name: ptc-pob-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pob-db
          property: connectionString
      - key: ADMIN_PIN
        generateValue: true

databases:
  - name: pob-db
    plan: free
    databaseName: pob_tracker
